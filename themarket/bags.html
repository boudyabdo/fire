<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bags - Lyam Market</title>
    <link rel="stylesheet" href="E:\o\nbs\the market\bags.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">Lyam Market</a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="clothing.html" target="_blank">Clothing</a></li>
                <li><a href="footwear.html" target="_blank">Footwear</a></li>
                <li><a href="bags.html" target="_blank">Bags</a></li>
                <li><a href="accessories.html" target="_blank">Accessories</a></li>
            </ul>
        </nav>
    </header>
    <div id="store"></div>
    <main>
        <section class="category-header">
            <h1>Bags</h1>
            <p>Explore our stylish and durable collection of bags for every occasion.</p>
        </section>

        <div class="products-grid">
            <div class="product-item">
                <img src="images/backpack.jpg" alt="Classic Backpack">
                <h3>Classic Backpack</h3>
                <p>$40.00</p>
                <button>Add to Cart</button>
            </div>
            <div class="product-item">
                <img src="images/tote.jpg" alt="Leather Tote Bag">
                <h3>Leather Tote Bag</h3>
                <p>$55.00</p>
                <button>Add to Cart</button>
            </div>
            <div class="product-item">
                <img src="images/suitcase.jpg" alt="Travel Suitcase">
                <h3>Travel Suitcase</h3>
                <p>$120.00</p>
                <button>Add to Cart</button>
            </div>
            <div class="product-item">
                <img src="images/slingbag.jpg" alt="Casual Sling Bag">
                <h3>Casual Sling Bag</h3>
                <p>$35.00</p>
                <button>Add to Cart</button>
            </div>
            <!-- Add more products here -->
        </div>
    </main>
    <script type="text/babel">
        function Store() {
            const [cart, setCart] = React.useState([]);
    
            const addToCart = (product) => {
                setCart(prevCart => {
                    const existingItem = prevCart.find(item => item.id === product.id);
                    if (existingItem) {
                        return prevCart.map(item =>
                            item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                        );
                    }
                    return [...prevCart, { ...product, quantity: 1 }];
                });
            };
    
            const removeFromCart = (id) => {
                setCart(cart.filter(item => item.id !== id));
            };
    
            const updateQuantity = (id, amount) => {
                setCart(prevCart =>
                    prevCart.map(item =>
                        item.id === id ? { ...item, quantity: Math.max(1, item.quantity + amount) } : item
                    )
                );
            };
    
            const products = [
                { id: 1, name: "Sample Product 1" },
                { id: 2, name: "Sample Product 2" }
            ];
    
            return (
                <div>
                    <div className="products">
                        <h2>Products</h2>
                        {products.map(product => (
                            <div key={product.id}>
                                <span>{product.name}</span>
                                <button onClick={() => addToCart(product)}>Add to Cart</button>
                            </div>
                        ))}
                    </div>
    
                    <div className="cart-container">
                        <h2>Shopping Cart</h2>
                        {cart.length > 0 ? cart.map(item => (
                            <div key={item.id}>
                                <span>{item.name} (x{item.quantity})</span>
                                <button onClick={() => updateQuantity(item.id, -1)}>-</button>
                                <button onClick={() => updateQuantity(item.id, 1)}>+</button>
                                <button onClick={() => removeFromCart(item.id)}>Remove</button>
                            </div>
                        )) : <p>Your cart is empty.</p>}
                    </div>
                </div>
            );
        }
    
        ReactDOM.createRoot(document.getElementById("store")).render(<Store />);
    </script>
    
    <footer>
        <p>&copy; 2024 Lyam Market. All rights reserved.</p>
    </footer>
</body>
</html>
